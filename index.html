<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Visibility Quick Scan</title>
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@300;400;500;600&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #F7F6F5;
  --surface: #ffffff;
  --surface-2: #f0efed;
  --border: rgba(34,34,34,0.1);
  --border-mid: rgba(34,34,34,0.18);
  --text: #222222;
  --text-secondary: #666666;
  --text-muted: #999999;
  --green-bg: #eaf5ea;
  --green-text: #2a7a2a;
  --red-bg: #fceaea;
  --red-text: #b83232;
  --neutral-bg: #f0efed;
  --neutral-text: #666666;
  --btn-primary: #222222;
  --heading-font: 'Nunito', 'SF Pro Rounded', -apple-system, sans-serif;
  --body-font: 'Work Sans', -apple-system, sans-serif;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--body-font);
  min-height: 100vh;
  line-height: 1.6;
  font-size: 15px;
}

.layout {
  max-width: 680px;
  margin: 0 auto;
  padding: 4rem 2rem 6rem;
}

.page-header { margin-bottom: 3rem; }
.page-title {
  font-family: var(--heading-font);
  font-size: 38px;
  font-weight: 600;
  color: var(--text);
  line-height: 1.15;
  margin-bottom: 14px;
}
.page-subtitle {
  font-size: 16px;
  color: var(--text-secondary);
  line-height: 1.7;
  max-width: 520px;
}

/* FORM VIEW */
.form-view { display: block; }
.form-view.hidden { display: none; }

.form-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 2rem;
}

.field { margin-bottom: 1.25rem; }
.field label {
  display: block;
  font-size: 12px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 7px;
  font-weight: 500;
}
.field input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 14px;
  font-size: 15px;
  color: var(--text);
  outline: none;
  font-family: var(--body-font);
  transition: border-color 0.15s;
}
.field input::placeholder { color: var(--text-muted); }
.field input:focus { border-color: var(--border-mid); background: #fff; }
.field-hint { font-size: 12px; color: var(--text-muted); margin-top: 5px; }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

.form-divider { height: 1px; background: var(--border); margin: 1.5rem 0; }
.form-section-label {
  font-size: 12px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--text-muted);
  font-weight: 500;
  margin-bottom: 1rem;
}

.run-btn {
  width: 100%;
  background: var(--btn-primary);
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 14px;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  font-family: var(--body-font);
  transition: opacity 0.15s;
  margin-top: 1.5rem;
}
.run-btn:hover { opacity: 0.85; }
.run-btn:disabled { opacity: 0.35; cursor: not-allowed; }

.error-bar {
  display: none;
  margin-top: 12px;
  padding: 11px 14px;
  background: var(--red-bg);
  border: 1px solid rgba(184,50,50,0.15);
  border-radius: 8px;
  font-size: 13px;
  color: var(--red-text);
}
.error-bar.show { display: block; }

/* LOADING VIEW */
.loading-view { display: none; padding: 3rem 0; }
.loading-view.show { display: block; }
.loading-label {
  font-size: 12px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 1.25rem;
}
.step-list { list-style: none; }
.step-list li {
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 14px;
  color: var(--text-muted);
  padding: 5px 0;
  transition: color 0.3s;
}
.step-list li.active { color: var(--text); }
.step-list li.done { color: var(--text-secondary); }
.step-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--border-mid);
  flex-shrink: 0;
  transition: background 0.3s;
}
.step-list li.active .step-dot { background: var(--text); }
.step-list li.done .step-dot { background: var(--text-secondary); }

/* RESULTS VIEW */
.results-view { display: none; }
.results-view.show { display: block; }

.result-brand { margin-bottom: 2rem; }
.result-brand h2 {
  font-family: var(--heading-font);
  font-size: 28px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 4px;
}
.result-meta { font-size: 13px; color: var(--text-muted); }

.score-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1.5rem;
  display: flex;
  align-items: center;
  gap: 20px;
  margin-bottom: 2.5rem;
}
.score-ring {
  width: 72px; height: 72px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  font-weight: 600;
  flex-shrink: 0;
  font-family: var(--heading-font);
}
.score-ring.good { background: var(--green-bg); color: var(--green-text); }
.score-ring.weak { background: var(--red-bg); color: var(--red-text); }
.score-info { flex: 1; }
.score-headline { font-size: 17px; font-weight: 500; color: var(--text); margin-bottom: 4px; font-family: var(--heading-font); }
.score-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.6; }

.section-label {
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-muted);
  font-weight: 500;
  margin-bottom: 1rem;
}

.queries { margin-bottom: 2.5rem; }
.query-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1.25rem;
  margin-bottom: 10px;
}
.query-type {
  font-size: 11px;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  color: var(--text-muted);
  font-weight: 500;
  margin-bottom: 6px;
}
.query-q {
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 10px;
  line-height: 1.4;
}
.query-result { font-size: 13px; color: var(--text-secondary); line-height: 1.6; }
.brand-found { color: var(--green-text); font-weight: 500; }
.brand-missing { color: var(--red-text); font-weight: 500; }

.gap-signals { margin-bottom: 2.5rem; }
.gap-row {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding: 1rem 0;
  border-bottom: 1px solid var(--border);
}
.gap-row:first-child { border-top: 1px solid var(--border); }
.gap-pillar {
  font-size: 11px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--text-muted);
  font-weight: 500;
  min-width: 64px;
  padding-top: 2px;
}
.gap-content { flex: 1; }
.gap-name { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 3px; }
.gap-signal-text { font-size: 13px; color: var(--text-secondary); line-height: 1.5; }

.status-pill {
  display: inline-block;
  font-size: 11px;
  font-weight: 500;
  padding: 3px 10px;
  border-radius: 20px;
  white-space: nowrap;
  flex-shrink: 0;
  margin-top: 2px;
}
.status-pill.good { background: var(--green-bg); color: var(--green-text); }
.status-pill.weak { background: var(--red-bg); color: var(--red-text); }
.status-pill.not-found { background: var(--neutral-bg); color: var(--neutral-text); border: 1px solid var(--border); }

.cta-card {
  background: var(--text);
  border-radius: 12px;
  padding: 2rem;
  margin-top: 0.5rem;
}
.cta-card h3 {
  font-family: var(--heading-font);
  font-size: 22px;
  font-weight: 600;
  color: #fff;
  margin-bottom: 10px;
  line-height: 1.3;
}
.cta-card p {
  font-size: 14px;
  color: rgba(255,255,255,0.7);
  line-height: 1.7;
  margin-bottom: 1.5rem;
  max-width: 460px;
}
.cta-link {
  display: inline-block;
  background: #fff;
  color: var(--text);
  border-radius: 8px;
  padding: 12px 24px;
  font-size: 14px;
  font-weight: 500;
  text-decoration: none;
  font-family: var(--body-font);
  transition: opacity 0.15s;
}
.cta-link:hover { opacity: 0.9; }

.reset-btn {
  background: none;
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text-secondary);
  font-size: 13px;
  padding: 10px 20px;
  cursor: pointer;
  margin-top: 1.5rem;
  font-family: var(--body-font);
  transition: border-color 0.15s, color 0.15s;
}
.reset-btn:hover { border-color: var(--border-mid); color: var(--text); }

@media (max-width: 580px) {
  .field-row { grid-template-columns: 1fr; }
  .layout { padding: 2rem 1.25rem 4rem; }
  .page-title { font-size: 28px; }
  .score-card { flex-direction: column; align-items: flex-start; gap: 12px; }
  .form-card { padding: 1.25rem; }
}
</style>
</head>
<body>
<div class="layout">
  <!-- FORM VIEW -->
  <div class="form-view" id="form-view">
    <div class="form-card">
      <div class="field">
        <label>Your website URL</label>
        <input type="text" id="url" placeholder="e.g. yoursite.com" />
      </div>
      <div class="field">
        <label>Brand name</label>
        <input type="text" id="brand" placeholder="e.g. Acme Co" />
      </div>
      <div class="field">
        <label>Business category</label>
        <input type="text" id="category" placeholder="e.g. London aesthetics clinic" />
        <div class="field-hint">Be specific — include your location or niche if relevant.</div>
      </div>

      <div class="form-divider"></div>
      <div class="form-section-label">Competitors (optional but recommended)</div>
      <div class="field-row">
        <div class="field" style="margin-bottom:0">
          <label>Competitor 1</label>
          <input type="text" id="comp1" placeholder="e.g. competitor.com" />
        </div>
        <div class="field" style="margin-bottom:0">
          <label>Competitor 2</label>
          <input type="text" id="comp2" placeholder="e.g. competitor2.com" />
        </div>
      </div>

      <button class="run-btn" id="run-btn" onclick="runScan()">Run AI visibility scan</button>
      <div class="error-bar" id="error-bar"></div>
    </div>
  </div>

  <!-- LOADING VIEW -->
  <div class="loading-view" id="loading-view">
    <p class="loading-label">Scanning AI responses...</p>
    <ul class="step-list">
      <li id="s0"><span class="step-dot"></span>Running informational queries</li>
      <li id="s1"><span class="step-dot"></span>Running comparative queries</li>
      <li id="s2"><span class="step-dot"></span>Checking competitor citations</li>
      <li id="s3"><span class="step-dot"></span>Mapping visibility gaps</li>
    </ul>
  </div>

  <!-- RESULTS VIEW -->
  <div class="results-view" id="results-view"></div>

</div>

<script>
const STEPS = ['s0','s1','s2','s3'];
let stepTimer;
let storedData = null;



const SIGNALS = {
  A: {
    'good':      'This brand appears reliably when AI responds to high-intent queries in this category.',
    'weak':      'This brand appears inconsistently in AI responses — present for some queries, absent for others.',
    'not-found': 'This brand does not appear when AI responds to high-intent category queries in this space.'
  },
  B: {
    'good':      'AI describes this brand accurately and specifically when asked directly.',
    'weak':      'AI may not be distinguishing this brand clearly — responses risk being vague or conflated with unrelated entities.',
    'not-found': 'AI has no clear understanding of what this brand is or does.'
  },
  C: {
    'good':      'AI can extract and cite specific, accurate information about this brand in response to relevant queries.',
    'weak':      'AI may be unable to extract and cite specific, accurate answers about this brand — responses risk being vague or incomplete.',
    'not-found': 'AI has nothing specific to cite from this brand — responses default to generic category information instead.'
  },
  D: {
    'good':      'A visitor arriving via AI is likely to find their expectations confirmed and a clear path to convert.',
    'weak':      'A high-intent visitor arriving via AI may not find what they came to confirm, creating friction at the point of conversion.',
    'not-found': 'A visitor arriving via AI would find nothing to confirm the expectations AI set before they arrived.'
  }
};

function advanceSteps(i) {
  if (i >= STEPS.length) return;
  STEPS.forEach((id, idx) => {
    document.getElementById(id).className = idx < i ? 'done' : idx === i ? 'active' : '';
  });
  stepTimer = setTimeout(() => advanceSteps(i + 1), 4000);
}

function resetSteps() {
  clearTimeout(stepTimer);
  STEPS.forEach(id => { document.getElementById(id).className = ''; });
}

function showError(msg) {
  const el = document.getElementById('error-bar');
  el.textContent = msg;
  el.className = 'error-bar show';
  // Make sure form is visible when showing error
  document.getElementById('form-view').classList.remove('hidden');
  document.getElementById('loading-view').className = 'loading-view';
  document.getElementById('run-btn').disabled = false;
  document.getElementById('run-btn').textContent = 'Run AI visibility scan';
}

function clearError() {
  document.getElementById('error-bar').className = 'error-bar';
}

function pill(status) {
  const map = { good: 'Good', weak: 'Weak', 'not-found': 'Not found' };
  return `<span class="status-pill ${status}">${map[status] || status}</span>`;
}

async function runScan() {
  clearError();
  const url = document.getElementById('url').value.trim();
  const brand = document.getElementById('brand').value.trim();
  const category = document.getElementById('category').value.trim();
  const comp1 = document.getElementById('comp1').value.trim();
  const comp2 = document.getElementById('comp2').value.trim();
  const competitors = [comp1, comp2].filter(Boolean);

  if (!url || !brand || !category) {
    showError('Please fill in your website URL, brand name and business category.');
    return;
  }

  // Hide form, show loading
  document.getElementById('form-view').classList.add('hidden');
  document.getElementById('results-view').className = 'results-view';
  document.getElementById('loading-view').className = 'loading-view show';
  resetSteps();
  advanceSteps(0);

  const compText = competitors.length
    ? `Competitors to compare against: ${competitors.join(', ')}.`
    : 'No competitors provided.';

  const prompt = `You are an AI visibility analyst. Assess how the brand "${brand}" (website: ${url}) appears in AI-generated responses for the category: "${category}". ${compText}

Use web search to find relevant information about this brand and any competitors listed.

Your job is to simulate what a real user experiences when asking AI assistants about this category BEFORE visiting any website. This is a D0 pre-arrival AI journey map.

Return ONLY valid JSON with no markdown, no preamble, nothing before the opening brace or after the closing brace.

Run exactly 3 queries:
1. Informational: a generic "how do I find / what is the best [category]" query a real user would type
2. Comparative: a query comparing options, naming the competitors if provided, otherwise generic comparison
3. Navigational: a direct brand query e.g. "what does [brand] do" or "is [brand] any good"

For each query provide:
- The actual query text used
- Whether the brand appears (true/false)
- If brand does NOT appear and a competitor was provided, which competitor appears instead (string or null)
- What AI actually says in 1-2 sentences — specific and factual, not generic

For the 4 gap signals, assess each pillar based strictly on what your web search found. Return ONLY the status for each: "good", "weak", or "not-found". Do not write the signal text.

Pillar A (Discoverability): Does the brand appear in generic high-intent AI queries for this category? "good" = appears reliably. "weak" = appears sometimes. "not-found" = never appears.
Pillar B (Entity clarity): Is the brand's identity and offering clear and unambiguous based on what you found? "good" = clearly described. "weak" = vague or partial. "not-found" = no clear identity found.
Pillar C (Content extractability): Can specific, accurate facts about this brand be extracted from what you found? "good" = specific facts available. "weak" = only generic info. "not-found" = nothing to extract.
Pillar D (Decision journey): Based on what you found about the site, would a high-intent visitor be able to confirm expectations and convert? "good" = clear path to convert. "weak" = friction exists. "not-found" = no conversion path evident.

Scoring rules (calculate honestly based on your findings above):
- Each "good" pillar = 25 points
- Each "weak" pillar = 10 points  
- Each "not-found" pillar = 0 points
- overall_score = sum of all four pillar scores
- overall_label = "Strong" if score >= 75, "Moderate" if score >= 50, "Weak" if score < 50

Return this exact JSON structure with no example values — replace all placeholders with your actual findings:
{
  "brand": "${brand}",
  "url": "${url}",
  "category": "${category}",
  "overall_score": [calculated integer],
  "overall_label": "[Strong|Moderate|Weak]",
  "queries": [
    {
      "type": "Informational",
      "query": "[actual query you used]",
      "brand_appears": [true|false],
      "competitor_cited": "[competitor name or null]",
      "ai_says": "[what you actually found — specific and factual, not generic]"
    },
    {
      "type": "Comparative",
      "query": "[actual query you used]",
      "brand_appears": [true|false],
      "competitor_cited": "[competitor name or null]",
      "ai_says": "[what you actually found]"
    },
    {
      "type": "Navigational",
      "query": "[actual query you used]",
      "brand_appears": [true|false],
      "competitor_cited": null,
      "ai_says": "[what you actually found about the brand directly]"
    }
  ],
  "gap_signals": [
    {"pillar": "A", "name": "Discoverability", "status": "[good|weak|not-found]"},
    {"pillar": "B", "name": "Entity clarity", "status": "[good|weak|not-found]"},
    {"pillar": "C", "name": "Content extractability", "status": "[good|weak|not-found]"},
    {"pillar": "D", "name": "Decision journey", "status": "[good|weak|not-found]"}
  ]
}`;

  try {
    // Call your Netlify proxy function instead of Anthropic directly
    const res = await fetch('/.netlify/functions/scan', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 2500,
        temperature: 0,
        tools: [{ type: 'web_search_20250305', name: 'web_search' }],
        messages: [{ role: 'user', content: prompt }]
      })
    });

    clearTimeout(stepTimer);
    STEPS.forEach(id => { document.getElementById(id).className = 'done'; });

    if (!res.ok) {
      const errData = await res.json().catch(() => ({}));
      throw new Error(errData.error?.message || 'Scan failed. Please try again.');
    }

    const data = await res.json();
    const text = (data.content || []).filter(b => b.type === 'text').map(b => b.text).join('');
    const s = text.indexOf('{');
    const e = text.lastIndexOf('}');
    if (s === -1 || e === -1) throw new Error('Could not parse response. Please try again.');
    const parsed = JSON.parse(text.slice(s, e + 1));

    document.getElementById('loading-view').className = 'loading-view';
    storedData = parsed;
    renderTeasedResults(parsed);

  } catch (err) {
    clearTimeout(stepTimer);
    showError('Scan failed: ' + (err.message || 'Please try again.'));
  }
}

function renderTeasedResults(d) {
  const pillarScores = { 'good': 25, 'weak': 10, 'not-found': 0 };
  const score = (d.gap_signals || []).reduce((sum, g) => sum + (pillarScores[g.status] || 0), 0);
  const overallLabel = score >= 75 ? 'Strong' : score >= 50 ? 'Moderate' : 'Weak';
  const cls = score >= 50 ? 'good' : 'weak';

  document.getElementById('results-view').innerHTML = `
    <div class="result-brand">
      <h2>${d.brand}</h2>
      <div class="result-meta">${d.url} &nbsp;&middot;&nbsp; ${d.category}</div>
    </div>

    <div class="score-card">
      <div class="score-ring ${cls}">${score}%</div>
      <div class="score-info">
        <div class="score-headline">AI visibility: ${overallLabel}</div>
        <div class="score-desc">Based on how this brand appears across informational, comparative, and navigational AI queries in this category.</div>
      </div>
    </div>

    <div style="position:relative; margin-bottom: 2.5rem;">
      <div style="filter: blur(5px); pointer-events: none; user-select: none;">
        <div class="section-label">What AI says before your visitor arrives</div>
        <div class="query-card"><div class="query-type">Informational</div><div class="query-q" style="height:1em;background:var(--border);border-radius:4px;width:80%"></div><div class="query-result" style="height:2.5em;background:var(--border);border-radius:4px;margin-top:8px"></div></div>
        <div class="query-card"><div class="query-type">Comparative</div><div class="query-q" style="height:1em;background:var(--border);border-radius:4px;width:70%"></div><div class="query-result" style="height:2.5em;background:var(--border);border-radius:4px;margin-top:8px"></div></div>
        <div class="query-card"><div class="query-type">Navigational</div><div class="query-q" style="height:1em;background:var(--border);border-radius:4px;width:75%"></div><div class="query-result" style="height:2.5em;background:var(--border);border-radius:4px;margin-top:8px"></div></div>
        <div class="section-label" style="margin-top:1.5rem">Visibility gap signals</div>
        ${(d.gap_signals || []).map(g => `<div class="gap-row"><div class="gap-pillar">Pillar ${g.pillar}</div><div class="gap-content"><div class="gap-name">${g.name}</div><div style="height:0.8em;background:var(--border);border-radius:4px;width:85%;margin-top:6px"></div></div>${pill(g.status)}</div>`).join('')}
      </div>
      <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:1rem;">
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.5rem 2rem;text-align:center;max-width:340px;width:100%;box-shadow:0 4px 24px rgba(34,34,34,0.08);">
          <div style="font-family:var(--heading-font);font-size:17px;font-weight:600;color:var(--text);margin-bottom:8px;">Your full results are ready</div>
          <div style="font-size:13px;color:var(--text-secondary);line-height:1.6;margin-bottom:1.25rem;">Enter your work email to unlock the query breakdown and gap analysis.</div>
          <input type="email" id="gate-email" placeholder="your@work.com" style="width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:14px;color:var(--text);outline:none;font-family:var(--body-font);margin-bottom:10px;box-sizing:border-box;" />
          <div id="gate-error" style="display:none;font-size:12px;color:var(--red-text);margin-bottom:8px;text-align:left;"></div>
          <button onclick="submitEmail()" id="gate-btn" style="width:100%;background:var(--btn-primary);color:#fff;border:none;border-radius:8px;padding:11px;font-size:14px;font-weight:500;cursor:pointer;font-family:var(--body-font);">Unlock my results</button>
        </div>
      </div>
    </div>
  `;

  document.getElementById('results-view').className = 'results-view show';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

async function submitEmail() {
  const emailInput = document.getElementById('gate-email');
  const btn = document.getElementById('gate-btn');
  const errEl = document.getElementById('gate-error');
  const email = emailInput ? emailInput.value.trim() : '';

  errEl.style.display = 'none';

  if (!email || !email.includes('@')) {
    errEl.textContent = 'Please enter a valid email address.';
    errEl.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Unlocking...';

  try {
    await fetch('/.netlify/functions/capture-email', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email,
        brand: storedData ? storedData.brand : '',
        url: storedData ? storedData.url : '',
        category: storedData ? storedData.category : '',
        score: storedData ? storedData.overall_score : 0
      })
    });
  } catch (err) {
    // Silently continue — never block the reveal on a capture failure
  }

  renderResults(storedData);
}

function renderResults(d) {
  // Always calculate score from pillars — never trust the AI's number
  const pillarScores = { 'good': 25, 'weak': 10, 'not-found': 0 };
  const computedScore = (d.gap_signals || []).reduce((sum, g) => sum + (pillarScores[g.status] || 0), 0);
  const score = computedScore;
  const overallLabel = score >= 75 ? 'Strong' : score >= 50 ? 'Moderate' : 'Weak';
  const isGood = score >= 50;
  const cls = isGood ? 'good' : 'weak';

  const queriesHtml = (d.queries || []).map(q => {
    let resultHtml = '';
    if (q.brand_appears) {
      resultHtml = `<span class="brand-found">Brand appears.</span> ${q.ai_says}`;
    } else if (q.competitor_cited) {
      resultHtml = `<span class="brand-missing">Brand not cited.</span> ${q.competitor_cited} appears instead. ${q.ai_says}`;
    } else {
      resultHtml = `<span class="brand-missing">Brand not cited.</span> ${q.ai_says}`;
    }
    return `
      <div class="query-card">
        <div class="query-type">${q.type}</div>
        <div class="query-q">"${q.query}"</div>
        <div class="query-result">${resultHtml}</div>
      </div>`;
  }).join('');

  const gapsHtml = (d.gap_signals || []).map(g => {
    const status = g.status || 'not-found';
    const signalText = (SIGNALS[g.pillar] && SIGNALS[g.pillar][status]) || '';
    return `
      <div class="gap-row">
        <div class="gap-pillar">Pillar ${g.pillar}</div>
        <div class="gap-content">
          <div class="gap-name">${g.name}</div>
          <div class="gap-signal-text">${signalText}</div>
        </div>
        ${pill(status)}
      </div>`;
  }).join('');

  document.getElementById('results-view').innerHTML = `
    <div class="result-brand">
      <h2>${d.brand}</h2>
      <div class="result-meta">${d.url} &nbsp;&middot;&nbsp; ${d.category}</div>
    </div>

    <div class="score-card">
      <div class="score-ring ${cls}">${score}%</div>
      <div class="score-info">
        <div class="score-headline">AI visibility: ${overallLabel}</div>
        <div class="score-desc">Based on how this brand appears across informational, comparative, and navigational AI queries in this category.</div>
      </div>
    </div>

    <div class="section-label">What AI says before your visitor arrives</div>
    <div class="queries">${queriesHtml}</div>

    <div class="section-label">Visibility gap signals</div>
    <div class="gap-signals">${gapsHtml}</div>

    <div class="cta-card">
      <h3>This scan shows you the gap.<br>A full audit shows you how to close it.</h3>
      <p>The AI Readiness UX Audit covers 30 items across all four pillars — with findings tied directly to pipeline outcomes and a prioritised action plan. From £699.</p>
      <a class="cta-link" href="https://xyrafoundry.com/contact" target="_blank">Get your full audit</a>
    </div>

    <button class="reset-btn" onclick="resetScan()">Run another scan</button>
  `;

  document.getElementById('results-view').className = 'results-view show';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function resetScan() {
  // Clear results, show form again
  document.getElementById('results-view').className = 'results-view';
  document.getElementById('form-view').classList.remove('hidden');
  clearError();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
</body>
</html>
